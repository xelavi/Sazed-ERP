# Stack PrestaShop 8 aislado del backend Django y del stack Odoo.
# Arrancar/parar de forma independiente:
#   docker compose -f docker-compose.prestashop.yml up -d
#   docker compose -f docker-compose.prestashop.yml down
#
# Variables requeridas en .env (raíz del repo):
#   PS_DB_USER, PS_DB_PASSWORD, PS_DB_ROOT_PASSWORD,
#   PS_ADMIN_MAIL, PS_ADMIN_PASSWORD
#
# Tras arrancar (la primera instalación tarda 2-4 min):
#   http://localhost:8080            → tienda (front office)
#   http://localhost:8080/admin1234  → back office (PS_ADMIN_MAIL / PS_ADMIN_PASSWORD)
#
# Luego: Parámetros avanzados → Webservice → activar y crear una API key.

services:
  prestashop_db:
    image: mariadb:10.11
    container_name: prestashop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${PS_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: prestashop
      MYSQL_USER: ${PS_DB_USER}
      MYSQL_PASSWORD: ${PS_DB_PASSWORD}
    volumes:
      - prestashop_db_data:/var/lib/mysql
    networks:
      - prestashop_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 20

  prestashop:
    image: prestashop/prestashop:8.1
    container_name: prestashop
    restart: unless-stopped
    depends_on:
      prestashop_db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      DB_SERVER: prestashop_db
      DB_PORT: 3306
      DB_NAME: prestashop
      DB_USER: ${PS_DB_USER}
      DB_PASSWD: ${PS_DB_PASSWORD}
      DB_PREFIX: ps_
      PS_INSTALL_AUTO: 1
      PS_ERASE_DB: 0
      PS_DEV_MODE: 0
      PS_DOMAIN: localhost:8080
      PS_FOLDER_ADMIN: admin1234
      PS_FOLDER_INSTALL: install
      PS_LANGUAGE: es
      PS_COUNTRY: es
      PS_ENABLE_SSL: 0
      ADMIN_MAIL: ${PS_ADMIN_MAIL}
      ADMIN_PASSWD: ${PS_ADMIN_PASSWORD}
    volumes:
      - prestashop_data:/var/www/html
    networks:
      - prestashop_net

volumes:
  prestashop_db_data:
  prestashop_data:

networks:
  prestashop_net:
    driver: bridge
